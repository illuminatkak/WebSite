<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="PaymentPage.css">
    <link href='https://fonts.googleapis.com/css?family=Kotta One' rel='stylesheet'>

</head>
<body>
   <div id="antet" class="antet">
        <a href="HomePage.html" class="logo"><img src="logow.png" width="40px">Uraboros</a>
        <input type="text" class="search-input" placeholder="Search...">
        <a href="HomePage.html">Acasa</a>
        <a href="ProdusePage.html">Produse</a>
        <a href="about us.html">Despre Noi</a>
        <a href="politics.html">Politici</a>
        <a href="PaymentPage.html"><img src="basket.png" width="30px"></a>
    </div>
    <div class="body">
        <div class="checkout-wrapper">
    <div class="cart-column">
        <button class="clear-cart-btn">
            <span class="cart-icon">🗑</span> Sterge totul din cos
        </button>
        
        <div class="cos" id="cart-items-container">
            </div>
    </div>

    <div class="form-column">
        
        <div class="form-section">
            <h2>Date</h2>
            <input type="text" placeholder="Nume Prenume">
            <input type="text" placeholder="Telefon: +373 064745634">
            <input type="email" placeholder="Email">
        </div>

        <div class="form-section">
            <h2>Adresa</h2>
            <input type="text" placeholder="Strada">
            <input type="text" placeholder="Apartamentul scara" class="input-highlight">
            <input type="text" placeholder="Codul postal">
        </div>

        <div class="form-section">
            <h2>Achitare</h2>
            <div class="payment-options">
                <button class="pay-btn">Cas pe loc</button>
                <button class="pay-btn">Card pe loc</button>
                <button class="pay-btn full-width">Online</button>
            </div>
        </div>

        <div class="summary-section">
            <div class="summary-row">
                <span>Subtotal</span>
                <span class="serif-price" id="summary-subtotal"></span>
            </div>
            <div class="summary-row">
                <span>Livrare</span>
                <span class="serif-price" id="summary-shipping"></span>
            </div>
            
            <hr class="summary-divider">
            
            <div class="total-row">
                <span class="total-title">Total</span>
                <span class="total-price" id="summary-total"></span>
            </div>
        </div>

        <div class="form-footer">
            <img src="scared.png" class="footer-dragon-small" alt="Dragon">
            <button class="place-order-btn">Plaseaza comanda</button>
        </div>
    </div>
</div></div>
    
    <script src="js.js"></script>

</body>
</html>
